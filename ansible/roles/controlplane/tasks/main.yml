---
# ── kubeadm init ─────────────────────────────────────────────
- name: Check if cluster is already initialized
  stat:
    path: /etc/kubernetes/admin.conf
  register: kubeadm_init_check

- name: Pull kubeadm images
  command: kubeadm config images pull
  when: not kubeadm_init_check.stat.exists

- name: Initialize the Kubernetes cluster
  command: >
    kubeadm init
      --apiserver-advertise-address={{ control_ip }}
      --apiserver-cert-extra-sans={{ control_ip }}
      --pod-network-cidr={{ pod_cidr }}
      --service-cidr={{ service_cidr }}
      --node-name controlplane
      --ignore-preflight-errors Swap
  when: not kubeadm_init_check.stat.exists

# ── kubeconfig for root ──────────────────────────────────────
- name: Create .kube directory for root
  file:
    path: /root/.kube
    state: directory
    mode: "0755"

- name: Copy admin.conf to root kubeconfig
  copy:
    src: /etc/kubernetes/admin.conf
    dest: /root/.kube/config
    remote_src: true
    owner: root
    group: root
    mode: "0644"

# ── kubeconfig for vagrant user ──────────────────────────────
- name: Create .kube directory for vagrant
  file:
    path: /home/vagrant/.kube
    state: directory
    owner: vagrant
    group: vagrant
    mode: "0755"

- name: Copy admin.conf to vagrant kubeconfig
  copy:
    src: /etc/kubernetes/admin.conf
    dest: /home/vagrant/.kube/config
    remote_src: true
    owner: vagrant
    group: vagrant
    mode: "0644"

# ── Ensure Calico CNI directory ──────────────────────────────
- name: Create Calico CNI directory
  file:
    path: /var/lib/calico
    state: directory
    mode: "0755"

# ── Install Calico ───────────────────────────────────────────
- name: Download Calico manifest
  get_url:
    url: "https://raw.githubusercontent.com/projectcalico/calico/v{{ calico_version }}/manifests/calico.yaml"
    dest: /tmp/calico.yaml

- name: Apply Calico manifest
  become_user: vagrant
  command: kubectl apply -f /tmp/calico.yaml
  register: calico_result
  changed_when: "'created' in calico_result.stdout or 'configured' in calico_result.stdout"

- name: Apply Metrics Server manifest
  become_user: vagrant
  command: kubectl apply -f https://raw.githubusercontent.com/techiescamp/kubeadm-scripts/main/manifests/metrics-server.yaml
  register: metrics_result
  changed_when: "'created' in metrics_result.stdout or 'configured' in metrics_result.stdout"

- name: Generate kubeadm join command
  command: kubeadm token create --print-join-command
  register: join_command_output
  changed_when: false

- name: Store join command as fact
  set_fact:
    kubeadm_join_command: "{{ join_command_output.stdout }}"

- name: Fetch admin.conf to local machine
  fetch:
    src: /etc/kubernetes/admin.conf
    dest: "{{ playbook_dir }}/fetched/admin.conf"
    flat: true

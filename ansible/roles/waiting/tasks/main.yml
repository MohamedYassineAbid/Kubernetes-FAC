---
- name: Get all pods status
  become_user: vagrant
  command: kubectl get pods --all-namespaces --no-headers
  register: pods_status
  until: >-
    pods_status.stdout_lines | 
    reject('search', 'Running|Completed') | 
    list | length == 0
  retries: 60
  delay: 10
  changed_when: false

- name: Print pod status
  debug:
    var: pods_status.stdout_lines

---
- name: Repair apt cache if corrupted
  shell: |
    rm -rf /var/lib/apt/lists/*
    apt clean
    apt update
  become: true

- name: Add controlplane to /etc/hosts
  lineinfile:
    path: /etc/hosts
    line: "{{ control_ip }} controlplane"
    state: present

- name: Add worker nodes to /etc/hosts
  lineinfile:
    path: /etc/hosts
    line: "{{ ip_nw }}{{ ip_start + item | int }} node0{{ item }}"
    state: present
  loop: "{{ range(1, worker_count + 1) | list }}"

- name: Create systemd-resolved config directory
  file:
    path: /etc/systemd/resolved.conf.d
    state: directory
    mode: "0755"

- name: Configure DNS servers
  copy:
    dest: /etc/systemd/resolved.conf.d/dns_servers.conf
    content: |
      [Resolve]
      DNS={{ dns_servers | join(' ') }}
  notify: restart systemd-resolved

- name: Disable swap immediately
  command: swapoff -a
  changed_when: false

- name: Remove swap entries from fstab
  replace:
    path: /etc/fstab
    regexp: '^\s*([^#].*?\sswap\s.*)$'
    replace: '# \1'

- name: Add crontab entry to keep swap off
  cron:
    name: "Disable swap on reboot"
    special_time: reboot
    job: "/sbin/swapoff -a"

- name: Install prerequisite packages
  apt:
    name:
      - nfs-common
      - software-properties-common
      - curl
      - apt-transport-https
      - ca-certificates
      - jq
      - gnupg
    state: present
    update_cache: true

- name: Create kernel modules config for k8s
  copy:
    dest: /etc/modules-load.d/k8s.conf
    content: |
      overlay
      br_netfilter

- name: Load overlay module
  modprobe:
    name: overlay
    state: present

- name: Load br_netfilter module
  modprobe:
    name: br_netfilter
    state: present

- name: Set sysctl params for k8s
  copy:
    dest: /etc/sysctl.d/k8s.conf
    content: |
      net.bridge.bridge-nf-call-iptables  = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward                 = 1
  notify: reload sysctl

- name: Apply sysctl settings now
  command: sysctl --system
  changed_when: false

- name: Create keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Add CRI-O apt key
  shell: |
    curl -fsSL https://pkgs.k8s.io/addons:/cri-o:/prerelease:/main/deb/Release.key | \
      gpg --dearmor -o /etc/apt/keyrings/cri-o-apt-keyring.gpg
  args:
    creates: /etc/apt/keyrings/cri-o-apt-keyring.gpg

- name: Add CRI-O repository
  copy:
    dest: /etc/apt/sources.list.d/cri-o.list
    content: |
      deb [signed-by=/etc/apt/keyrings/cri-o-apt-keyring.gpg] https://pkgs.k8s.io/addons:/cri-o:/prerelease:/main/deb/ /

- name: Install CRI-O
  apt:
    name: cri-o
    state: present
    update_cache: true

- name: Enable and start CRI-O
  systemd:
    name: crio
    enabled: true
    state: started
    daemon_reload: true

- name: Add Kubernetes apt key
  shell: |
    curl -fsSL https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version_short }}/deb/Release.key | \
      gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
  args:
    creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg

- name: Add Kubernetes repository
  copy:
    dest: /etc/apt/sources.list.d/kubernetes.list
    content: |
      deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version_short }}/deb/ /

- name: Install kubelet, kubectl, kubeadm
  apt:
    name:
      - "kubelet={{ kubernetes_version }}"
      - "kubectl={{ kubernetes_version }}"
      - "kubeadm={{ kubernetes_version }}"
    state: present
    update_cache: true

- name: Hold Kubernetes packages at current version
  dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop:
    - kubelet
    - kubectl
    - kubeadm
    - cri-o
- name: Get eth1 IP address
  shell: ip --json a s | jq -r '.[] | if .ifname == "eth1" then .addr_info[] | if .family == "inet" then .local else empty end else empty end'
  register: node_ip
  changed_when: false

- name: Configure kubelet with node IP
  copy:
    dest: /etc/default/kubelet
    content: |
      KUBELET_EXTRA_ARGS=--node-ip={{ node_ip.stdout }}
